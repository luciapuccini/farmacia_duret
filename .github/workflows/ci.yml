name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fallow PR audit
        env:
          FALLOW_BASE: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.before }}
        run: npm run fallow:audit -- --base "$FALLOW_BASE"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
